<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentFlow Hub — Commission Ledger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0b1523;
      --surface:  #111e30;
      --card:     #16253a;
      --border:   #1f3452;
      --teal:     #00cfc8;
      --teal-lo:  rgba(0,207,200,.08);
      --text:     #ccdaec;
      --muted:    #607a97;
      --error-bg: rgba(248,113,113,.08);
      --error-fg: #f87171;
      --ok-bg:    rgba(52,211,153,.1);
      --ok-fg:    #34d399;
      --warn-bg:  rgba(251,191,36,.08);
      --warn-fg:  #fbbf24;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column;
    }

    .pulse-bar {
      position: fixed; top: 0; left: 0; right: 0; height: 2px;
      background: var(--teal); z-index: 999;
      animation: pbar 2.4s ease-in-out infinite;
    }
    @keyframes pbar {
      0%,100% { opacity:.3; box-shadow: 0 0 6px var(--teal); }
      50%      { opacity:1;  box-shadow: 0 0 20px var(--teal), 0 0 40px var(--teal); }
    }

    header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      height: 56px; padding: 0 40px;
      background: rgba(11,21,35,.88); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }

    .brand {
      display: flex; align-items: baseline; gap: 8px;
      text-decoration: none;
    }
    .logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px; color: var(--teal); letter-spacing: .05em;
    }
    .brand-tag { font-size: 11px; color: var(--muted); }

    nav { display: flex; gap: 2px; }
    nav a {
      font-size: 13px; color: var(--muted); text-decoration: none;
      padding: 6px 12px; border-radius: 6px;
      transition: color .2s, background .2s;
    }
    nav a:hover  { color: var(--text); background: rgba(255,255,255,.04); }
    nav a.active { color: var(--teal); font-weight: 600; }

    main {
      flex: 1; max-width: 1200px; width: 100%;
      margin: 0 auto; padding: 40px 40px 64px;
    }

    .page-header {
      margin-bottom: 32px; padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-end; justify-content: space-between; gap: 16px;
    }
    .page-header h1 { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .page-header p  { font-size: 13px; color: var(--muted); }

    .source-badge {
      font-size: 10px; font-weight: 600; letter-spacing: .06em;
      padding: 3px 10px; border-radius: 10px;
      text-transform: uppercase; white-space: nowrap; flex-shrink: 0;
    }
    .source-live   { background: rgba(52,211,153,.1);   color: #34d399; }
    .source-static { background: var(--teal-lo); color: var(--teal); border: 1px solid rgba(0,207,200,.2); }

    #loading {
      display: flex; flex-direction: column;
      align-items: center; gap: 16px;
      padding: 80px 24px;
      color: var(--muted); font-size: 14px;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #dashboard-error {
      display: none;
      background: var(--error-bg);
      border: 1px solid rgba(248,113,113,.25);
      border-radius: 10px;
      color: var(--error-fg);
      font-size: 14px; font-weight: 500;
      padding: 20px 24px;
    }

    #reports-table { display: none; }

    .table-wrapper {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .table-meta {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .table-meta strong { font-size: 13px; color: var(--text); font-weight: 600; }
    .table-meta span   { font-size: 12px; color: var(--muted); }

    .table-scroll { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead { background: var(--surface); }
    th {
      text-align: left; padding: 12px 16px;
      font-size: 11px; font-weight: 600;
      color: var(--muted); text-transform: uppercase; letter-spacing: .07em;
      white-space: nowrap;
    }
    th.num { text-align: right; }
    td {
      padding: 13px 16px;
      border-top: 1px solid var(--border);
      color: var(--text); vertical-align: middle;
    }
    td.num {
      text-align: right;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
    }
    tbody tr:hover { background: rgba(0,207,200,.04); }

    .badge {
      display: inline-block;
      font-size: 11px; font-weight: 600;
      padding: 3px 10px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: .04em;
      white-space: nowrap;
    }
    .badge-ok      { background: var(--ok-bg);   color: var(--ok-fg);   }
    .badge-pending { background: var(--warn-bg);  color: var(--warn-fg); }
    .badge-error   { background: var(--error-bg); color: var(--error-fg); }

    @media (max-width: 768px) {
      header { padding: 0 20px; }
      .brand-tag { display: none; }
      main { padding: 24px 16px 48px; }
      .page-header { flex-direction: column; align-items: flex-start; }
      thead { display: none; }
      tbody tr {
        display: block; padding: 12px 16px;
        border-top: 1px solid var(--border);
      }
      td {
        display: flex; justify-content: space-between; align-items: center;
        padding: 4px 0; border: none; font-size: 12px; text-align: left;
      }
      td.num { text-align: left; }
      td::before {
        content: attr(data-label);
        font-size: 10px; font-weight: 600;
        color: var(--muted); text-transform: uppercase;
        letter-spacing: .06em; flex-shrink: 0; margin-right: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="pulse-bar"></div>

  <header>
    <a class="brand" href="dashboard.html">
      <span class="logo">AgentFlow</span>
      <span class="brand-tag">Hub</span>
    </a>
    <nav>
      <a href="login.html">Login</a>
      <a href="dashboard.html" class="active">Dashboard</a>
    </nav>
  </header>

  <main>
    <div class="page-header">
      <div>
        <h1>Commission Ledger</h1>
        <p>Processed commission reports from manual insurer uploads</p>
      </div>
      <span class="source-badge" id="source-badge" style="display:none"></span>
    </div>

    <div id="loading">
      <div class="spinner"></div>
      <span>Fetching commission ledger…</span>
    </div>

    <div id="dashboard-error" data-testid="error-message">
      API connection failed — ensure the server is running.
    </div>

    <div id="reports-table" data-testid="dashboard-table">
      <div class="table-wrapper">
        <div class="table-meta">
          <strong>Commission Records</strong>
          <span id="row-count"></span>
        </div>
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>Insurer</th>
                <th>Month</th>
                <th>Category</th>
                <th class="num">Commission (₪)</th>
                <th class="num">Policies</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="reports-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script>
    var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    function fmtMonth(m) {
      var p = (m || '').split('-');
      if (p.length !== 2) return m || '—';
      return (MONTHS[parseInt(p[0], 10) - 1] || p[0]) + ' ' + p[1];
    }

    function capitalize(s) {
      return s ? s.charAt(0).toUpperCase() + s.slice(1) : '—';
    }

    function renderRow(r) {
      var tr  = document.createElement('tr');
      tr.setAttribute('data-testid', 'dashboard-row');
      var cls = { processed: 'badge-ok', pending: 'badge-pending', error: 'badge-error' }[r.status] || 'badge-pending';
      tr.innerHTML =
        '<td data-label="Insurer">'                                 + (r.manufacturer || '—')                          + '</td>' +
        '<td data-label="Month">'                                   + fmtMonth(r.month)                                + '</td>' +
        '<td data-label="Category">'                                + capitalize(r.category)                           + '</td>' +
        '<td data-label="Commission" class="num">₪'                + Number(r.totalCommission || 0).toLocaleString()  + '</td>' +
        '<td data-label="Policies" class="num">'                   + (r.policyCount || 0)                             + '</td>' +
        '<td data-label="Status"><span class="badge ' + cls + '">' + capitalize(r.status)                             + '</span></td>';
      return tr;
    }

    function showTable(rows, sourceLabel, sourceClass) {
      var tbody   = document.getElementById('reports-body');
      var tableEl = document.getElementById('reports-table');
      var countEl = document.getElementById('row-count');
      var badge   = document.getElementById('source-badge');

      rows.forEach(function(r) { tbody.appendChild(renderRow(r)); });
      countEl.textContent   = rows.length + ' record' + (rows.length === 1 ? '' : 's');
      tableEl.style.display = 'block';
      badge.textContent     = sourceLabel;
      badge.className       = 'source-badge ' + sourceClass;
      badge.style.display   = 'inline-block';
    }

    async function loadReports() {
      var loadingEl = document.getElementById('loading');
      var errorEl   = document.getElementById('dashboard-error');

      loadingEl.style.display = 'flex';
      errorEl.style.display   = 'none';

      try {
        // Layer 1: live server API
        var res = await fetch('/api/dashboard');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        var ct = res.headers.get('content-type') || '';
        if (!ct.includes('application/json')) throw new Error('Not JSON');
        var data = await res.json();
        showTable(data, 'Live data', 'source-live');
      } catch (_) {
        try {
          // Layer 2: pre-built static snapshot (CI-generated, served alongside HTML)
          var staticRes = await fetch('./data/dashboard.json');
          if (!staticRes.ok) throw new Error();
          var staticData = await staticRes.json();
          showTable(staticData, 'Sample data', 'source-static');
        } catch (_) {
          // Both sources unavailable
          errorEl.style.display = 'block';
        }
      } finally {
        loadingEl.style.display = 'none';
      }
    }

    loadReports();
  </script>
</body>
</html>
