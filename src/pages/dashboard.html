<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentFlow — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0D1B2A;
      --teal: #00D4D4;
      --surface: #112233;
      --border: #1e3448;
      --text: #c8d8e8;
      --muted: #6b8299;
    }

    body {
      background: var(--navy);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    .pulse-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--teal);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; box-shadow: 0 0 4px var(--teal); }
      50%       { opacity: 1;   box-shadow: 0 0 16px var(--teal), 0 0 32px var(--teal); }
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      color: var(--teal);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .brand { display: flex; align-items: baseline; gap: 10px; }

    .brand-tag {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    nav { display: flex; flex-wrap: wrap; gap: 4px; }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      margin-left: 20px;
      padding: 6px 0;
      transition: color 0.2s;
      white-space: nowrap;
    }

    nav a:hover  { color: var(--teal); }
    nav a.active { color: var(--teal); font-weight: 500; }

    #dashboard-error {
      display: none;
      text-align: center;
      color: #ff6b6b;
      padding: 48px 24px;
      font-size: 14px;
    }

    /* ── Main ───────────────────────────────────────────────── */
    main {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 24px;
    }

    h1 {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 16px;
      color: var(--text);
    }

    /* ── Claude badge ───────────────────────────────────────── */
    .claude-badge {
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, rgba(0,212,212,0.08), rgba(0,212,212,0.03));
      border: 1px solid rgba(0,212,212,0.4);
      border-radius: 10px;
      padding: 12px 20px;
      margin-bottom: 24px;
      font-size: 13px;
      color: var(--teal);
      font-family: 'JetBrains Mono', monospace;
      animation: badge-glow 3s ease-in-out infinite;
      flex-wrap: wrap;
      gap: 10px;
    }

    .badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--teal);
      flex-shrink: 0;
      animation: dot-pulse 1.5s ease-in-out infinite;
    }

    @keyframes badge-glow {
      0%, 100% { box-shadow: 0 0 8px rgba(0,212,212,0.15); border-color: rgba(0,212,212,0.3); }
      50%       { box-shadow: 0 0 24px rgba(0,212,212,0.45), 0 0 48px rgba(0,212,212,0.1); border-color: rgba(0,212,212,0.7); }
    }

    @keyframes dot-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.75); }
    }

    /* ── Table ──────────────────────────────────────────────── */
    .table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-radius: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      min-width: 560px;
    }

    thead th {
      text-align: left;
      padding: 10px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:hover { background: var(--surface); }

    td { padding: 12px 16px; color: var(--text); }

    .status-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
    }

    .status-processed { background: rgba(0,212,212,0.12); color: var(--teal); }
    .status-pending   { background: rgba(255,170,0,0.12);  color: #ffaa00; }

    #loading {
      text-align: center;
      color: var(--muted);
      padding: 48px;
      font-size: 14px;
    }

    /* ── Responsive ─────────────────────────────────────────── */
    @media (max-width: 768px) {
      header {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
        padding: 16px 20px;
      }

      nav a:first-child { margin-left: 0; }

      main { margin: 24px auto; padding: 0 16px; }

      .claude-badge { font-size: 12px; padding: 10px 14px; }

      h1 { font-size: 17px; }
    }

    @media (max-width: 480px) {
      /* Stack table rows into key-value cards */
      .table-wrapper { overflow-x: visible; border-radius: 0; }

      table, thead, tbody, th, td, tr { display: block; }

      thead { display: none; }

      tbody tr {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        margin-bottom: 12px;
        padding: 4px 0;
      }

      tbody tr:hover { background: var(--surface); }

      td {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--border);
        padding: 10px 14px;
        font-size: 13px;
      }

      td:last-child { border-bottom: none; }

      td::before {
        content: attr(data-label);
        font-family: 'Inter', sans-serif;
        font-size: 10px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--muted);
        flex-shrink: 0;
        margin-right: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="pulse-bar"></div>
  <header>
    <div class="brand">
      <span class="logo">AgentFlow</span>
      <span class="brand-tag">Insurance Platform Hub</span>
    </div>
    <nav>
      <a href="/login">Login</a>
      <a href="/dashboard" class="active">Dashboard</a>
      <a href="/downloads">Downloads</a>
    </nav>
  </header>
  <main>
    <h1>Commission Reports</h1>

    <div class="claude-badge">
      <span class="badge-dot"></span>
      🤖 Live LLM Mock Data Active — Generated dynamically via <strong style="margin:0 4px">Claude API</strong> (claude-sonnet-4-6)
    </div>

    <div id="loading">Loading reports…</div>
    <div id="dashboard-error">Service unavailable — please try again later.</div>

    <div class="table-wrapper">
      <table id="reports-table" style="display:none">
        <thead>
          <tr>
            <th>Manufacturer</th>
            <th>Month</th>
            <th>Total Commission</th>
            <th>Policy Count</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="reports-body"></tbody>
      </table>
    </div>
  </main>
  <script>
    function formatCurrency(n) {
      return '₪' + n.toLocaleString('he-IL');
    }

    function renderRow(report) {
      return `<tr>
        <td data-label="Manufacturer">${report.manufacturer}</td>
        <td data-label="Month">${report.month}</td>
        <td data-label="Total Commission">${formatCurrency(report.totalCommission)}</td>
        <td data-label="Policy Count">${report.policyCount}</td>
        <td data-label="Status"><span class="status-badge status-${report.status}">${report.status}</span></td>
      </tr>`;
    }

    async function loadReports() {
      const loadingEl = document.getElementById('loading');
      const errorEl   = document.getElementById('dashboard-error');

      try {
        const res = await fetch('/api/dashboard');

        if (res.status >= 500) {
          // Explicit server error — show message, do not attempt static fallback
          loadingEl.style.display = 'none';
          errorEl.style.display   = 'block';
          return;
        }

        if (res.ok) {
          const reports = await res.json();
          loadingEl.style.display = 'none';
          if (reports.length) {
            document.getElementById('reports-body').innerHTML = reports.map(renderRow).join('');
            document.getElementById('reports-table').style.display = 'table';
          }
          return;
        }
        // 4xx / backend not present → fall through to static file
      } catch { /* network error → fall through to static file */ }

      // Static fallback for GitHub Pages (pre-generated by CI)
      try {
        const res = await fetch('./data/dashboard.json');
        if (res.ok) {
          const reports = await res.json();
          loadingEl.style.display = 'none';
          if (reports.length) {
            document.getElementById('reports-body').innerHTML = reports.map(renderRow).join('');
            document.getElementById('reports-table').style.display = 'table';
          }
          return;
        }
      } catch { /* ignore */ }

      loadingEl.style.display = 'none';
    }

    loadReports();
  </script>
</body>
</html>
