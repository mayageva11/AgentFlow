<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentFlow — Downloads</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0D1B2A;
      --teal: #00D4D4;
      --surface: #112233;
      --border: #1e3448;
      --text: #c8d8e8;
      --muted: #6b8299;
    }

    body {
      background: var(--navy);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    .pulse-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--teal);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; box-shadow: 0 0 4px var(--teal); }
      50%       { opacity: 1;   box-shadow: 0 0 16px var(--teal), 0 0 32px var(--teal); }
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      color: var(--teal);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    nav { display: flex; flex-wrap: wrap; }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      margin-left: 20px;
      padding: 6px 0;
      transition: color 0.2s;
      white-space: nowrap;
    }

    nav a:hover { color: var(--teal); }

    /* ── Main ───────────────────────────────────────────────── */
    main {
      max-width: 720px;
      margin: 40px auto;
      padding: 0 24px;
    }

    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px 32px;
      margin-bottom: 24px;
    }

    h2 {
      font-size: 15px;
      font-weight: 500;
      color: var(--teal);
      margin-bottom: 20px;
      font-family: 'JetBrains Mono', monospace;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      background: var(--navy);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }

    input:focus, select:focus { border-color: var(--teal); }

    input[type="file"] {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      cursor: pointer;
    }

    button {
      background: var(--teal);
      color: var(--navy);
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 24px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.85; }

    .result       { margin-top: 14px; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--teal); min-height: 20px; }
    .result.error { color: #ff6b6b; }

    .template-link {
      display: inline-block;
      color: var(--teal);
      text-decoration: none;
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      border: 1px solid var(--teal);
      border-radius: 8px;
      padding: 10px 20px;
      transition: background 0.2s;
    }

    .template-link:hover { background: rgba(0,212,212,0.08); }

    /* ── Responsive ─────────────────────────────────────────── */
    @media (max-width: 768px) {
      header {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
        padding: 16px 20px;
      }

      nav a:first-child { margin-left: 0; }

      main { margin: 24px auto; padding: 0 16px; }

      .section { padding: 20px; }
    }

    @media (max-width: 480px) {
      .section { padding: 16px; border-radius: 10px; }

      input, select {
        font-size: 16px; /* prevents iOS zoom */
        padding: 12px;
      }

      button { width: 100%; padding: 14px; }

      .template-link { display: block; text-align: center; padding: 14px; }
    }
  </style>
</head>
<body>
  <div class="pulse-bar"></div>
  <header>
    <span class="logo">AgentFlow</span>
    <nav>
      <a href="/dashboard">Dashboard</a>
      <a href="/downloads">Downloads</a>
    </nav>
  </header>
  <main>

    <div class="section">
      <h2>Create Manufacturer</h2>
      <label for="manufacturer-name">Name</label>
      <input id="manufacturer-name" type="text" placeholder="e.g. מנורה" />
      <label for="manufacturer-color">Icon Color</label>
      <input id="manufacturer-color" type="text" placeholder="#00D4D4" />
      <button id="create-manufacturer-btn">Create Manufacturer</button>
      <div id="manufacturer-result" class="result"></div>
    </div>

    <div class="section">
      <h2>Create Report</h2>
      <label for="report-manufacturer-id">Manufacturer ID</label>
      <input id="report-manufacturer-id" type="text" placeholder="Paste manufacturer ID" />
      <label for="report-branch">Branch</label>
      <input id="report-branch" type="text" placeholder="e.g. North" />
      <label for="report-name">Report Name</label>
      <input id="report-name" type="text" placeholder="e.g. Q1 2024" />
      <label for="report-category">Category</label>
      <input id="report-category" type="text" placeholder="life | health | pension | property" />
      <button id="create-report-btn">Create Report</button>
      <div id="report-result" class="result"></div>
    </div>

    <div class="section">
      <h2>Upload File</h2>
      <label for="upload-file">Excel File (.xlsx)</label>
      <input id="upload-file" type="file" accept=".xlsx" />
      <button id="upload-btn">Upload</button>
      <div id="upload-result" class="result"></div>
    </div>

    <div class="section">
      <h2>Excel Template</h2>
      <p style="font-size:13px;color:var(--muted);margin-bottom:16px;">
        Download the column structure template before uploading.
      </p>
      <a id="download-template-btn" class="template-link" href="/api/upload/template" download>
        Download Template
      </a>
    </div>

  </main>
  <script>
    const DEMO_MSG = 'Backend not running — start the server locally for live interactions (npm run server)';

    document.getElementById('create-manufacturer-btn').addEventListener('click', async () => {
      const el = document.getElementById('manufacturer-result');
      const name      = document.getElementById('manufacturer-name').value;
      const iconColor = document.getElementById('manufacturer-color').value;
      try {
        const res = await fetch('/api/manufacturer', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, iconColor }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        el.textContent = `Created — ID: ${data.id}`;
        el.className = 'result';
      } catch {
        el.textContent = DEMO_MSG;
        el.className = 'result error';
      }
    });

    document.getElementById('create-report-btn').addEventListener('click', async () => {
      const el             = document.getElementById('report-result');
      const manufacturerId = document.getElementById('report-manufacturer-id').value;
      const branch         = document.getElementById('report-branch').value;
      const name           = document.getElementById('report-name').value;
      const category       = document.getElementById('report-category').value;
      try {
        const res = await fetch('/api/report', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ manufacturerId, branch, name, category }),
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.error || `HTTP ${res.status}`);
        }
        const data = await res.json();
        el.textContent = `Created — ID: ${data.id}`;
        el.className = 'result';
      } catch (err) {
        const msg = (err instanceof Error && err.message !== 'Failed to fetch') ? `Error: ${err.message}` : DEMO_MSG;
        el.textContent = msg;
        el.className = 'result error';
      }
    });

    document.getElementById('upload-btn').addEventListener('click', async () => {
      const el   = document.getElementById('upload-result');
      const file = document.getElementById('upload-file').files[0];
      if (!file) return;
      const form = new FormData();
      form.append('file', file);
      try {
        const res  = await fetch('/api/upload', { method: 'POST', body: form });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        el.textContent = `Status: ${data.status}`;
        el.className = data.status === 50 ? 'result' : 'result error';
      } catch {
        el.textContent = DEMO_MSG;
        el.className = 'result error';
      }
    });
  </script>
</body>
</html>
