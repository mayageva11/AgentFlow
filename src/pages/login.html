<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentFlow Hub — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0b1523;
      --surface: #111e30;
      --card:    #16253a;
      --border:  #1f3452;
      --teal:    #00cfc8;
      --teal-lo: rgba(0,207,200,.08);
      --text:    #ccdaec;
      --muted:   #607a97;
      --error:   #f87171;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── top loader bar ────────────────────────────────────── */
    .pulse-bar {
      position: fixed; top: 0; left: 0; right: 0; height: 2px;
      background: var(--teal);
      animation: pbar 2.4s ease-in-out infinite;
      z-index: 999;
    }
    @keyframes pbar {
      0%,100% { opacity:.35; box-shadow: 0 0 6px var(--teal); }
      50%      { opacity:1;   box-shadow: 0 0 20px var(--teal), 0 0 40px var(--teal); }
    }

    /* ── nav ───────────────────────────────────────────────── */
    header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      height: 56px; padding: 0 40px;
      background: rgba(11,21,35,.85);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }

    .brand { display: flex; align-items: baseline; gap: 8px; }
    .logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px; color: var(--teal); letter-spacing: .05em;
    }
    .brand-tag { font-size: 11px; color: var(--muted); }

    nav { display: flex; gap: 2px; }
    nav a {
      font-size: 13px; color: var(--muted); text-decoration: none;
      padding: 6px 12px; border-radius: 6px;
      transition: color .2s, background .2s;
    }
    nav a:hover  { color: var(--text);  background: rgba(255,255,255,.04); }
    nav a.active { color: var(--teal);  font-weight: 600; }

    /* ── demo banner ───────────────────────────────────────── */
    #demo-banner {
      display: none;
      background: var(--teal-lo);
      border-bottom: 1px solid rgba(0,207,200,.18);
      padding: 8px 24px;
      font-size: 12px; color: var(--teal); text-align: center;
    }

    /* ── page centre ───────────────────────────────────────── */
    .page-center {
      flex: 1; display: flex;
      align-items: center; justify-content: center;
      padding: 48px 16px;
    }

    /* ── auth card ─────────────────────────────────────────── */
    .auth-card {
      width: 100%; max-width: 400px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 44px 40px;
      box-shadow: 0 24px 64px rgba(0,0,0,.45);
    }

    .auth-card h2 {
      font-size: 20px; font-weight: 600;
      color: var(--text); margin-bottom: 4px;
    }
    .auth-card p {
      font-size: 13px; color: var(--muted); margin-bottom: 32px;
    }

    label {
      display: block; font-size: 11px; font-weight: 600;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: .08em; margin-bottom: 6px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      padding: 11px 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      margin-bottom: 18px;
    }
    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(0,207,200,.14);
    }

    button[type="submit"] {
      width: 100%;
      background: var(--teal);
      color: #0b1523;
      border: none; border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px; font-weight: 600;
      padding: 13px;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
      margin-top: 4px;
    }
    button[type="submit"]:hover  { opacity: .88; transform: translateY(-1px); }
    button[type="submit"]:active { opacity: 1;   transform: none; }

    #error-msg {
      color: var(--error); font-size: 13px;
      text-align: center; margin-top: 12px; min-height: 18px;
    }

    /* ── demo credentials box ──────────────────────────────── */
    .cred-box {
      margin-top: 24px;
      padding: 16px;
      background: var(--teal-lo);
      border: 1px solid rgba(0,207,200,.2);
      border-radius: 10px;
      font-size: 12px; color: var(--muted); line-height: 2;
    }
    .cred-box strong { color: var(--teal); display: block; margin-bottom: 4px; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; }
    .cred-box code   { color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 12px; }

    /* ── responsive ────────────────────────────────────────── */
    @media (max-width: 768px) {
      header { padding: 0 20px; }
      .brand-tag { display: none; }
    }
    @media (max-width: 480px) {
      .auth-card { padding: 32px 22px; }
      input[type="email"], input[type="password"] { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="pulse-bar"></div>

  <header>
    <div class="brand">
      <span class="logo">AgentFlow</span>
      <span class="brand-tag">Hub</span>
    </div>
    <nav>
      <a href="/login" class="active">Login</a>
      <a href="/dashboard">Dashboard</a>
      <a href="/downloads">Upload &amp; Templates</a>
    </nav>
  </header>

  <div id="demo-banner">
    ✦ Static Demo Mode — any credentials accepted &nbsp;·&nbsp; GitHub Pages deployment
  </div>

  <div class="page-center">
    <div class="auth-card">
      <h2>Welcome back</h2>
      <p>Sign in to the AgentFlow Insurance Platform Hub</p>

      <form id="login-form">
        <label for="email">Email address</label>
        <input id="email" name="email" type="email" placeholder="agent@example.com" autocomplete="email" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required />

        <button type="submit">Sign in</button>
      </form>

      <div id="error-msg"></div>

      <div class="cred-box">
        <strong>Demo Credentials</strong>
        <code>agency-a@agentflow.dev</code> / <code>Test1234!</code><br/>
        <code>agency-b@agentflow.dev</code> / <code>Test1234!</code>
      </div>
    </div>
  </div>

  <script>
    // ── environment detection ───────────────────────────────
    const isGitHubPages = window.location.hostname.includes('github.io');

    const NAV = {
      '/login':     isGitHubPages ? './login.html'     : '/login',
      '/dashboard': isGitHubPages ? './dashboard.html' : '/dashboard',
      '/downloads': isGitHubPages ? './downloads.html' : '/downloads',
    };

    // Rewrite nav hrefs
    document.querySelectorAll('nav a[href]').forEach(a => {
      const k = a.getAttribute('href');
      if (NAV[k]) a.href = NAV[k];
    });

    if (isGitHubPages) {
      document.getElementById('demo-banner').style.display = 'block';
    }

    // ── login handler ───────────────────────────────────────
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      if (isGitHubPages) {
        window.location.href = './dashboard.html';
        return;
      }

      const email    = document.querySelector('[name="email"]').value;
      const password = document.querySelector('[name="password"]').value;
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      if (res.ok) {
        window.location.href = '/dashboard';
      } else {
        document.getElementById('error-msg').textContent = 'Invalid credentials. Please try again.';
      }
    });
  </script>
</body>
</html>
