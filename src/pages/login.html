<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentFlow — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0D1B2A;
      --teal: #00D4D4;
      --surface: #112233;
      --border: #1e3448;
      --text: #c8d8e8;
      --muted: #6b8299;
    }

    body {
      background: var(--navy);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .pulse-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--teal);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; box-shadow: 0 0 4px var(--teal); }
      50%       { opacity: 1;   box-shadow: 0 0 16px var(--teal), 0 0 32px var(--teal); }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      color: var(--teal);
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: 0.04em;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 36px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: var(--navy);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 20px;
    }

    input:focus { border-color: var(--teal); }

    button[type="submit"] {
      width: 100%;
      background: var(--teal);
      color: var(--navy);
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 14px;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 4px;
    }

    button[type="submit"]:hover { opacity: 0.85; }

    #error-msg {
      color: #ff6b6b;
      font-size: 13px;
      text-align: center;
      margin-top: 14px;
      min-height: 18px;
    }

    /* ── Responsive ─────────────────────────────────────────── */
    @media (max-width: 480px) {
      body { justify-content: flex-start; padding-top: 48px; }
      .card { padding: 32px 20px; border-radius: 10px; }
      .logo { font-size: 18px; }
      input { font-size: 16px; /* prevents iOS zoom */ }
    }
  </style>
</head>
<body>
  <div class="pulse-bar"></div>
  <div class="card">
    <div class="logo">AgentFlow</div>
    <div class="subtitle">Insurance Commission Platform</div>
    <form id="login-form">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="email" required />
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required />
      <button type="submit">Sign In</button>
    </form>
    <div id="error-msg"></div>
  </div>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.querySelector('[name="email"]').value;
      const password = document.querySelector('[name="password"]').value;
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      if (res.ok) {
        window.location.href = '/dashboard';
      } else {
        document.getElementById('error-msg').textContent = 'Invalid credentials';
      }
    });
  </script>
</body>
</html>
