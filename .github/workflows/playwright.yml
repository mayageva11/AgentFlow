name: Playwright CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate fixtures
        run: npm run generate:fixtures

      - name: Run tests
        run: npm test
        env:
          CI: true

      - name: Generate Allure report
        if: always()
        run: |
          mkdir -p allure-results
          rm -rf allure-report
          npx allure generate allure-results -o allure-report

      - name: Build GitHub Pages site
        if: always()
        run: |
          mkdir -p gh-pages/report gh-pages/data
          cp -r allure-report/. gh-pages/report/
          cp src/pages/login.html     gh-pages/login.html
          cp src/pages/dashboard.html gh-pages/dashboard.html
          touch gh-pages/.nojekyll
          # Root redirects to the Allure test report
          printf '<meta http-equiv="refresh" content="0;url=report/index.html" />\n' > gh-pages/index.html
          # Pre-built sample data so the dashboard works without a running server
          cat > gh-pages/data/dashboard.json << 'JSONEOF'
          [
            {"manufacturer":"מנורה מבטחים","month":"06-2025","category":"life","totalCommission":128400,"policyCount":87,"status":"processed"},
            {"manufacturer":"הפניקס ביטוח","month":"06-2025","category":"health","totalCommission":94250,"policyCount":63,"status":"processed"},
            {"manufacturer":"הראל ביטוח","month":"05-2025","category":"pension","totalCommission":211800,"policyCount":142,"status":"processed"},
            {"manufacturer":"מגדל ביטוח","month":"05-2025","category":"property","totalCommission":67900,"policyCount":44,"status":"pending"},
            {"manufacturer":"כלל ביטוח","month":"04-2025","category":"life","totalCommission":154600,"policyCount":103,"status":"processed"}
          ]
          JSONEOF

      - name: Upload Allure artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: gh-pages/report/
          retention-days: 30

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: gh-pages
          branch: gh-pages
          clean: true
