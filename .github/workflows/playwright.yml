name: Playwright CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate fixtures
        run: npm run generate:fixtures

      - name: Run tests
        run: npm test
        env:
          CI: true
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Generate static dashboard data
        if: always()
        run: npm run generate:dashboard
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Generate Allure report
        if: always()
        run: |
          mkdir -p allure-results
          rm -rf allure-report
          npx allure generate allure-results -o allure-report

      - name: Build GitHub Pages site
        if: always()
        run: |
          mkdir -p gh-pages/report
          cp -r allure-report/. gh-pages/report/
          cp src/pages/landing.html   gh-pages/index.html
          cp src/pages/login.html     gh-pages/login.html
          cp src/pages/dashboard.html gh-pages/dashboard.html
          cp src/pages/downloads.html gh-pages/downloads.html
          if [ -f dist/static/dashboard.json ]; then
            mkdir -p gh-pages/data
            cp dist/static/dashboard.json gh-pages/data/dashboard.json
          fi
          touch gh-pages/.nojekyll

      - name: Upload Allure artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: gh-pages/report/
          retention-days: 30

      - name: Deploy to gh-pages branch
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          cd gh-pages
          git init
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy: ${GITHUB_SHA::7}"
          git push -f \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git \
            HEAD:gh-pages
