name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate fixtures
        run: npm run generate:fixtures

      - name: Start server
        run: npm run server &
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Wait for server
        run: npx wait-on http://127.0.0.1:4000/health --timeout 30000

      - name: Run tests
        run: npm test
        env:
          CI: true
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Generate static dashboard data
        if: always()
        run: npm run generate:dashboard
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # allure@3.x (installed by allure-playwright) removed --clean; pre-delete output dir instead
      - name: Generate Allure report
        if: always()
        run: |
          mkdir -p allure-results
          rm -rf allure-report
          npx allure generate allure-results -o allure-report

      - name: Build GitHub Pages site
        if: always()
        run: |
          mkdir -p gh-pages/report allure-report
          cp -r allure-report/. gh-pages/report/
          cp src/pages/landing.html   gh-pages/index.html
          cp src/pages/login.html     gh-pages/login.html
          cp src/pages/dashboard.html gh-pages/dashboard.html
          cp src/pages/downloads.html gh-pages/downloads.html
          if [ -f dist/static/dashboard.json ]; then
            mkdir -p gh-pages/data
            cp dist/static/dashboard.json gh-pages/data/dashboard.json
          fi
          touch gh-pages/.nojekyll

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: gh-pages/report/
          retention-days: 30

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./gh-pages

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: deploy
        uses: actions/deploy-pages@v4
